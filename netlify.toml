[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION = "20"

# Static export with trailingSlash:true generates /page/index.html
# No SPA fallback needed — each route has its own file
# Serve 404 page for unmatched routes
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Cache Next.js static chunks aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache public assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers on all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
